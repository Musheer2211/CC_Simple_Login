{% extends "layout.html" %}

{% block content %}
<h2>Login</h2>
<form method="post" action="{{ url_for('login') }}">
  <div class="form-group">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />
  </div>
  <button type="submit">Log in</button>
</form>

<p style="margin-top: 1rem;">
  Don't have an account? <a href="{{ url_for('register') }}">Register</a>
</p>

<div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #ccc;">
  <p style="text-align: center; color: #666; font-size: 14px;">
    This server provides OAuth 2.0 authentication. See the <a href="{{ url_for('admin_clients') }}">client management</a> page to register OAuth applications.
  </p>
</div>
{% endblock %}
