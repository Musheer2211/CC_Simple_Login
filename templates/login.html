{% extends "layout.html" %}

{% block content %}
<h2>Login</h2>
<form method="post" action="{{ url_for('login') }}">
  <div class="form-group">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" required />
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required />
  </div>
  <button type="submit">Log in</button>
</form>

<div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #ccc;">
  <p style="text-align: center; margin-bottom: 1rem;">or</p>
  <a href="{{ url_for('login_google') }}" style="display: inline-block; background-color: #4285f4; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; font-weight: bold;">
    Sign in with Google
  </a>
</div>

<p style="margin-top: 1rem;">
  Don't have an account? <a href="{{ url_for('register') }}">Register</a>
</p>
{% endblock %}
