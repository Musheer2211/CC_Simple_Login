<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flask Auth</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f7f8fb;
        color: #1a1a1a;
      }
      header {
        background: #0057d9;
        color: white;
        padding: 1rem;
      }
      main {
        max-width: 420px;
        margin: 2rem auto;
        padding: 1.5rem;
        background: white;
        border-radius: 10px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 0.25rem;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.65rem;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 0.75rem;
        border-radius: 8px;
        border: none;
        background-color: #0057d9;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover {
        background-color: #0042a8;
      }
      .alert {
        padding: 0.75rem 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      .alert.error {
        background: #fde2e2;
        color: #a71d2a;
      }
      .alert.success {
        background: #e6ffed;
        color: #1c6b2c;
      }
      .footer {
        text-align: center;
        margin-top: 1rem;
        color: #6b7280;
        font-size: 0.9rem;
      }
      a {
        color: #0057d9;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Flask Auth</h1>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      {% for category, message in messages %}
      <div class="alert {{ category }}">{{ message }}</div>
      {% endfor %}
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <p>Simple Flask login demo.</p>
    </footer>
  </body>
</html>
